name: CD

on:
  push:
    branches: [ "main" ]

jobs:
  pages:
    name: Publish Site
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests and generate site (Javadoc + test reports)
        run: mvn -B verify site
        working-directory: project

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: project/target/site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17 with GitHub Packages
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Publish SNAPSHOT to GitHub Packages
        run: mvn deploy -DskipTests --batch-mode
        working-directory: project
        env:
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN }}

  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/jndarray:latest
            ghcr.io/${{ github.repository_owner }}/jndarray:1.0-snapshot